<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-gradient">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white text-center">
                        <h1 class="mb-0">
                            <i class="fas fa-gamepad me-2"></i>
                            Tic Tac Toe
                        </h1>
                    </div>
                    <div class="card-body p-4">
                        <!-- Game Status -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <div class="alert alert-info text-center" id="status">
                                    Player X's turn
                                </div>
                            </div>
                        </div>

                        <!-- Score Board -->
                        <div class="row mb-4">
                            <div class="col-4">
                                <div class="text-center">
                                    <h5 class="text-primary">Player X</h5>
                                    <span class="badge bg-primary fs-5" id="score-x">0</span>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="text-center">
                                    <h5 class="text-secondary">Ties</h5>
                                    <span class="badge bg-secondary fs-5" id="score-ties">0</span>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="text-center">
                                    <h5 class="text-danger">Player O</h5>
                                    <span class="badge bg-danger fs-5" id="score-o">0</span>
                                </div>
                            </div>
                        </div>

                        <!-- Game Board -->
                        <div class="row justify-content-center">
                            <div class="col-auto">
                                <div class="game-board" id="game-board">
                                    <div class="cell" data-cell-index="0"></div>
                                    <div class="cell" data-cell-index="1"></div>
                                    <div class="cell" data-cell-index="2"></div>
                                    <div class="cell" data-cell-index="3"></div>
                                    <div class="cell" data-cell-index="4"></div>
                                    <div class="cell" data-cell-index="5"></div>
                                    <div class="cell" data-cell-index="6"></div>
                                    <div class="cell" data-cell-index="7"></div>
                                    <div class="cell" data-cell-index="8"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Game Controls -->
                        <div class="row mt-4">
                            <div class="col-12 text-center">
                                <button class="btn btn-success btn-lg me-2" id="restart-btn">
                                    <i class="fas fa-redo me-1"></i>
                                    New Game
                                </button>
                                <button class="btn btn-warning btn-lg" id="reset-scores-btn">
                                    <i class="fas fa-trash me-1"></i>
                                    Reset Scores
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
