<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="game-container">
                    <h1 class="text-center mb-4">Tic Tac Toe</h1>
                    
                    <!-- Game Status -->
                    <div class="status-container mb-4">
                        <div class="alert alert-info" id="status">
                            Player X's turn
                        </div>
                    </div>

                    <!-- Game Board -->
                    <div class="game-board">
                        <div class="row">
                            <div class="col-4">
                                <div class="cell" data-index="0"></div>
                            </div>
                            <div class="col-4">
                                <div class="cell" data-index="1"></div>
                            </div>
                            <div class="col-4">
                                <div class="cell" data-index="2"></div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-4">
                                <div class="cell" data-index="3"></div>
                            </div>
                            <div class="col-4">
                                <div class="cell" data-index="4"></div>
                            </div>
                            <div class="col-4">
                                <div class="cell" data-index="5"></div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-4">
                                <div class="cell" data-index="6"></div>
                            </div>
                            <div class="col-4">
                                <div class="cell" data-index="7"></div>
                            </div>
                            <div class="col-4">
                                <div class="cell" data-index="8"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Game Controls -->
                    <div class="controls mt-4">
                        <div class="row">
                            <div class="col-6">
                                <button class="btn btn-primary w-100" id="resetBtn">
                                    Reset Game
                                </button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-secondary w-100" id="newGameBtn">
                                    New Game
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Score Board -->
                    <div class="score-board mt-4">
                        <div class="row">
                            <div class="col-4">
                                <div class="score-card">
                                    <h5>Player X</h5>
                                    <span class="score" id="scoreX">0</span>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="score-card">
                                    <h5>Ties</h5>
                                    <span class="score" id="scoreTie">0</span>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="score-card">
                                    <h5>Player O</h5>
                                    <span class="score" id="scoreO">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
