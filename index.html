<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tic Tac Toe</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EP5QF9MKGxl+fv5IKxXo%2B05c2YA9u0oARAQZ53kpTP0PpC/3ujCj5iCpHf83AMkS" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
  <div class="container my-5">
    <h1 class="text-center mb-4">Tic Tac Toe</h1>

    <!-- Game board -->
    <div id="game" class="mx-auto">
      <div class="row g-0">
        <div class="col-4 border border-dark square d-flex align-items-center justify-content-center" data-index="0"></div>
        <div class="col-4 border border-dark square d-flex align-items-center justify-content-center" data-index="1"></div>
        <div class="col-4 border border-dark square d-flex align-items-center justify-content-center" data-index="2"></div>
        <div class="col-4 border border-dark square d-flex align-items-center justify-content-center" data-index="3"></div>
        <div class="col-4 border border-dark square d-flex align-items-center justify-content-center" data-index="4"></div>
        <div class="col-4 border border-dark square d-flex align-items-center justify-content-center" data-index="5"></div>
        <div class="col-4 border border-dark square d-flex align-items-center justify-content-center" data-index="6"></div>
        <div class="col-4 border border-dark square d-flex align-items-center justify-content-center" data-index="7"></div>
        <div class="col-4 border border-dark square d-flex align-items-center justify-content-center" data-index="8"></div>
      </div>
    </div>

    <!-- Status & reset -->
    <div class="text-center mt-4">
      <h3 id="status" class="mb-3">Player X's turn</h3>
      <button id="resetBtn" class="btn btn-primary">Reset Game</button>
    </div>
  </div>

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-V3gPoqZyFNefwG6Km8f7HI%2B5%2BnAlkbAMw1CBOJ7OcG7VHBUrcz3mqOLmAXNQHRVr" crossorigin="anonymous"></script>
  <!-- Game logic -->
  <script src="script.js"></script>
</body>
</html>
